<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShowTrackr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
  <div class="navbar-container">

    <div class="logo">Show<b>Trackr</b></div>

    <div class="left-menu">
      <a class="nav-link" id="nav-home" href="index.html">Home</a>
      <a class="nav-link" href="add.html">Add</a>
    </div>

    <div class="right-links">
      <a class="nav-link" href="login.html">Login</a>
      <a class="nav-link" id="nav-select" href="signup.html">Sign Up</a>
    </div>

  </div>
</nav>

    <!-- Sign up -->

    <section class="container-signup">
      <form action="">
        <div class="header-signup">
          <h1>Sign up</h1>
        </div>
        <div class="input-box">
          <input type="text" id="signupName" onblur="validateName()" placeholder="👤 Name" >
        </div>
        <p id="signupnameError"></p>
        <div class="input-box">
          <input type="email" id="signupEmail" onblur="validateEmail()" placeholder="✉️ Email">
        </div>
        <p id="signupemailError"></p>
        <div class="input-box">
          <input type="password" id="signupPassword" onblur="validatePassword()" placeholder="🔑 Password" minlength="5" >
        </div>
        <p id="signuppasswordError"></p>
        <p>By clicking on Sign up, you agree to <b>terms & conditions</b> and <b>privacy policy</b></p>
        <button class="signupButton">Sign up</button>

        <p class="login-text">Already have an accound? <a href="#" class="login-link" onclick="redirectLogin()">Log in now</a></p>
      </form>
    </section>    

    <script src="js/signup.js"></script>
</body>
</html>
