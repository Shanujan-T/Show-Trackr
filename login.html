<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShowTrackr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    
  </head>
  <body>
    <nav class="navbar">
  <div class="navbar-container">

    <!-- Logo -->
    <div class="logo">Show<b>Trackr</b></div>

    <!-- Left menu -->
    <div class="left-menu">
      <a class="nav-link" id="nav-home" href="index.html">Home</a>
      <a class="nav-link" href="add.html">Add</a>
    </div>

    <!-- Right menu -->
    <div class="right-links">
      <a class="nav-link" id="nav-select" href="login.html">Login</a>
      <a class="nav-link" href="signup.html">Sign Up</a>
    </div>

  </div>
</nav>

    <!-- Login Page -->

    <section class="container-login">
      <form action="">
        <div class="header-login">
          <h1>Log in</h1>
        </div>
        <div class="input-box">
          <input type="email" placeholder="✉️ Email" id="loginemail" required/>
        </div>
        <div class="input-box">
          <input type="password" id="loginpassword" placeholder="🔑 Password" minlength="5" required/>
        </div>
        <button class="loginButton">Log in</button>
        <div class="forgot"><a href="#" class="forgot-link">Forgot your password?</a></div>
        <p class="signup">
          Don't have an account yet? <a href="#" onclick="redirectSignup()">Sign up</a>
        </p>
        <hr>
        <div class="devider">or</div>
        <button class="facebook">Sign in with Facebook</button>
        <button class="google">Sign in with Google</button>
      </form>
    </section>
    <script src="js/login.js"></script>
  </body>
</html>
